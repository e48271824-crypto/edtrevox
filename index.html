<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Film Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: #0a0a0a; color: white; text-align: center; }
        .hero { 
            min-height: 100vh; 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1920') center/cover;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; max-width: 600px; }
        h1 { font-size: 3rem; margin-bottom: 20px; background: linear-gradient(45deg, #ff006e, #8338ec); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(0,0,0,0.5); border: 1px solid #444; 
            color: white; border-radius: 10px; 
        }
        button { 
            padding: 15px 40px; background: linear-gradient(45deg, #ff006e, #8338ec); 
            border: none; color: white; border-radius: 30px; 
            font-size: 18px; cursor: pointer; margin: 10px;
        }
        button:hover { transform: scale(1.1); }
        .result { display: none; margin-top: 20px; padding: 20px; background: rgba(0,255,0,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="box">
            <h1>🎬 AI Film Studio</h1>
            <p>Film konusu yaz:</p>
            <textarea id="topic" rows="3" placeholder="Örn: Gelecekte geçen bir bilim kurgu filmi..."></textarea>
            <br>
            <button onclick="create()">🎬 Film Oluştur</button>
            <div class="result" id="res">
                <h2>✅ Film Hazır!</h2>
                <p id="txt"></p>
                <button onclick="alert('İndiriliyor...')">📥 İndir</button>
            </div>
        </div>
    </div>
    <script>
        function create() {
            const t = document.getElementById('topic').value;
            if(!t) { alert('Konu yaz!'); return; }
            document.getElementById('res').style.display = 'block';
            document.getElementById('txt').innerHTML = '<b>' + t + '</b><br>Süre: 15 dk<br>Kalite: 4K';
        }
    </script>
</body>
</html>
